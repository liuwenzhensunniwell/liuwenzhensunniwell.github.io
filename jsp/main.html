<!DOCTYPE html>
<html lang="en">

<head>

    }

    .main_table {
        margin-top: 20px;
        width: 1024px;
        text-align: center;
    }

    thead {
        background-color: #F2F2F2;

    }
</style>

<body>
    <div class="top">
        <span style="margin-left: 10px;">欢迎您登录：</span>

    <div class="main">

            <form action="" method="POST">

                    <span>
                        <span

                    </span>
                </div>
                <div style="margin-top: 25px;margin-left: 20px;">

                </div>
            </form>
        </div>
        <div class="main_table">
            <table style="width: 100%;" cellspacing="0">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>标题</th>
                        <th>价格</th>
                        <th>产地</th>
                        <th>生产日期</th>

                <tbody>
                    <tr>
                        <td>1</td>

</html>
